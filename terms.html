                const userLang = navigator.language || navigator.userLanguage;
                if (userLang.toLowerCase().startsWith('he')) langKey = 'he';
                else if (userLang.toLowerCase().startsWith('ar')) langKey = 'ar';
                else langKey = 'en';
            }

            const isRtl = (langKey === 'he' || langKey === 'ar');

            document.getElementById('html-root').setAttribute('dir', isRtl ? 'rtl' : 'ltr');
            document.getElementById('html-root').setAttribute('lang', langKey);

            document.querySelectorAll('[data-i18n]').forEach(elem => {
                const key = elem.getAttribute('data-i18n');
                if (translations[langKey] && translations[langKey][key]) {
                    elem.innerText = translations[langKey][key];
                }
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-lang') === langKey) {
                    btn.classList.add('active');
                }
            });
            
            // update legal links
            const links = ['privacy', 'terms', 'accessibility'];
            links.forEach(id => {
                const el = document.getElementById('link-' + (id==='accessibility'?'access':id));
                if(el) el.href = `${id}.html?lang=${langKey}`;
            });

            // Update main content
            const contentContainer = document.getElementById('content-container');
            if (translations[langKey] && translations[langKey]['contentHtml']) {
                contentContainer.innerHTML = translations[langKey]['contentHtml'];
            }
            
            // Update URL without reloading
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('lang', langKey);
            window.history.replaceState({}, '', newUrl);
        }

        window.onload = () => setLanguage();
    </script>
</body>
</html>
